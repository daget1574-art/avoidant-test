<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회피형 성격 진단 검사</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            color: #1a1a1a;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        .category {
            background: white;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .category-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.1em;
        }
        .category-header:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3f92 100%);
        }
        .category-content {
            padding: 30px;
            display: none;
        }
        .category-content.active {
            display: block;
        }
        .question {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .question:last-child {
            border-bottom: none;
        }
        .question-number {
            font-weight: bold;
            color: #667eea;
            margin-right: 10px;
        }
        .question-text {
            font-size: 1em;
            color: #333;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .answers {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .answer-btn {
            width: 45px;
            height: 45px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .answer-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .answer-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .results {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .results.active {
            display: block;
        }
        .score-box {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .score-number {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .score-label {
            font-size: 1.3em;
            margin-bottom: 15px;
        }
        .score-level {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            font-weight: bold;
        }
        .category-score {
            background: #f5f7fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-score-name {
            font-weight: bold;
            color: #333;
        }
        .category-score-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        .interpretation {
            background: #e3f2fd;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .interpretation h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .interpretation p {
            color: #333;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .progress-text {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        .reset-btn {
            width: 100%;
            padding: 12px;
            background: #666;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .reset-btn:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>회피형 성격 진단 검사</h1>
            <p>100개의 질문으로 당신의 회피형 성향을 진단합니다</p>
            <p style="font-size: 0.9em; margin-top: 15px;">각 문항에 1~5점으로 응답해주세요 (1=전혀 그렇지 않다, 5=매우 그렇다)</p>
        </div>

        <div id="questionsContainer"></div>

        <div id="results" class="results">
            <h2 style="margin-bottom: 30px; text-align: center;">검사 결과</h2>
            <div class="score-box">
                <div class="score-label">종합 점수</div>
                <div class="score-number" id="totalScore">0%</div>
                <div class="score-level" id="scoreLevel">매우 낮음</div>
            </div>

            <div class="interpretation">
                <h3>결과 해석</h3>
                <div id="interpretationText"></div>
            </div>

            <h3 style="margin-bottom: 20px;">카테고리별 분석</h3>
            <div id="categoryScores"></div>

            <button class="reset-btn" onclick="location.reload()">다시 검사하기</button>
        </div>
    </div>

        let responses = {};

        function initQuestions() {
            const container = document.getElementById('questionsContainer');
            let questionNum = 1;

            Object.entries(questions).forEach((entry, categoryIdx) => {
                const [category, items] = entry;
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `
                    <div>${category}</div>
                    <div>▼</div>
                `;
                header.onclick = () => {
                    const content = categoryDiv.querySelector('.category-content');
                    content.classList.toggle('active');
                    header.style.background = content.classList.contains('active') 
                        ? 'linear-gradient(135deg, #5568d3 0%, #6a3f92 100%)'
                        : 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                };

                const content = document.createElement('div');
                content.className = 'category-content';
                
                items.forEach((question) => {
                    const questionDiv = document.createElement('div');
                    questionDiv.className = 'question';
                    questionDiv.innerHTML = `
                        <div class="question-text">
                            <span class="question-number">${questionNum}.</span>${question}
                        </div>
                        <div class="answers">
                            ${[1,2,3,4,5].map(score => `
                                <button class="answer-btn" onclick="answerQuestion(${questionNum-1}, ${score}, this)">
                                    ${score}
                                </button>
                            `).join('')}
                        </div>
                    `;
                    content.appendChild(questionDiv);
                    questionNum++;
                });

                categoryDiv.appendChild(header);
                categoryDiv.appendChild(content);
                container.appendChild(categoryDiv);
            });

            const submitBtn = document.createElement('button');
            submitBtn.className = 'submit-btn';
            submitBtn.textContent = '결과 확인하기';
            submitBtn.id = 'submitBtn';
            submitBtn.onclick = showResults;
            container.appendChild(submitBtn);

            const progressDiv = document.createElement('div');
            progressDiv.className = 'progress-text';
            progressDiv.id = 'progressText';
            progressDiv.textContent = '0/100 완료';
            container.insertBefore(progressDiv, submitBtn);
        }

        function answerQuestion(idx, score, btn) {
            responses[idx] = score;
            const btns = btn.parentElement.querySelectorAll('.answer-btn');
            btns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            updateProgress();
        }

        function updateProgress() {
            const answered = Object.keys(responses).length;
            document.getElementById('progressText').textContent = `${answered}/100 완료`;
            const submitBtn = document.getElementById('submitBtn');
            if (answered === 100) {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            } else {
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
            }
        }

        function showResults() {
            const categoryScores = {};
            let totalScore = 0;

            const categoryEntries = Object.entries(questions);
            let questionIdx = 0;

            categoryEntries.forEach(([category, items]) => {
                let categoryScore = 0;
                items.forEach(() => {
                    categoryScore += responses[questionIdx] || 0;
                    totalScore += responses[questionIdx] || 0;
                    questionIdx++;
                });
                categoryScores[category] = {
                    score: categoryScore,
                    max: items.length * 5,
                    percentage: Math.round((categoryScore / (items.length * 5)) * 100)
                };
            });

            const totalPercentage = Math.round((totalScore / 500));

            let levelText = '매우 낮음';
            let levelColor = 'rgb(52, 211, 153)';

            if (totalPercentage >= 80) {
                levelText = '매우 높음 (전문가 상담 권장)';
                levelColor = 'rgb(239, 68, 68)';
            } else if (totalPercentage >= 60) {
                levelText = '높음 (개선 노력 필요)';
                levelColor = 'rgb(249, 115, 22)';
            } else if (totalPercentage >= 40) {
                levelText = '중간';
                levelColor = 'rgb(234, 179, 8)';
            } else if (totalPercentage >= 20) {
                levelText = '낮음';
                levelColor = 'rgb(59, 130, 246)';
            }

            document.getElementById('totalScore').textContent = totalPercentage + '%';
            document.getElementById('scoreLevel').textContent = levelText;
            document.getElementById('scoreLevel').style.background = levelColor;
            document.getElementById('scoreLevel').style.color = 'white';

            const interpretations = {
                '매우 낮음': '회피형 성향이 거의 없습니다. 건강한 관계 형성이 매우 수월합니다.',
                '낮음': '회피형 성향이 낮습니다. 건강한 관계 형성이 비교적 수월합니다.',
                '중간': '회피형 성향이 중간 정도입니다. 특정 영역에 집중해 개선할 수 있습니다.',
                '높음 (개선 노력 필요)': '회피형 성향이 상당합니다. 자신의 행동 패턴을 인식하고 개선 노력이 필요합니다.',
                '매우 높음 (전문가 상담 권장)': '회피형 성향이 매우 강합니다. 전문가 상담을 고려해보세요.'
            };

            document.getElementById('interpretationText').innerHTML = `<p>${interpretations[levelText]}</p>`;

            const categoryScoresDiv = document.getElementById('categoryScores');
            categoryScoresDiv.innerHTML = '';

            Object.entries(categoryScores).forEach(([category, scores]) => {
                const div = document.createElement('div');
                div.className = 'category-score';
                div.innerHTML = `
                    <div>
                        <div class="category-score-name">${category}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${scores.percentage}%"></div>
                        </div>
                    </div>
                    <div class="category-score-value">${scores.percentage}%</div>
                `;
                categoryScoresDiv.appendChild(div);
            });

            document.getElementById('questionsContainer').style.display = 'none';
            document.getElementById('results').classList.add('active');
        }

        initQuestions();
    </script>
</body>
</html>
